<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejestracja</title>
    <link rel="stylesheet" href="styl.css">
</head>
<body>
    <header>
        <h1>Formularz rejestracyjny konferencji <i>Nasze kwiaty</i></h1>
    </header>
    <main>
        <form action="">
            <div id="pierwszy">
                <h2>Dane osobowe</h2>
                <input type="text" name="" id="imie" required placeholder="Wpisz imię..."><br>
                <input type="text" name="" id="nazwisko" required placeholder="Wpisz nazwisko..."><br>
                <button onclick="pierwsza()">Następna karta</button>
            </div>
            <div id="drugi">
                <h2>Dane kontaktowe</h2>
                <input type="email" name="" id="email" placeholder="Twój e-mail..."><br>
                <input type="tel" name="" id="telefon" placeholder="Twój numer telefonu..."><br>
                <button onclick="druga()">Następna karta</button>
            </div>
            <div id="trzeci">
                <h2>Hasło do logowania</h2>
                <input type="password" name="" id="haslo1" placeholder="Podaj hasło"><br>
                <input type="password" name="" id="haslo2" placeholder="Powtórz hasło"><br>
                <button onclick="trzecia()">Zatwierdź</button>
            </div>
        </form>
    </main>
    <footer>
        <video src="motyl.mp4">Przeglądarka nie obsługuje tego formatu</video>
    </footer>
    <footer>
        <h3>Plan konferencji</h3>
        <table>
            <tr>
                <td>9:00 - 12:00</td>
                <td>Pielęgnacja roślin</td>
            </tr>
            <tr>
                <td>13:00 - 15:00 </td>
                <td>Targi kwiatowe</td>
            </tr>
        </table>
    </footer>
    <footer>
        <p><a href="https://kwiaty.pl/">Internetowa kwiaciarnia</a></p>
    </footer>
    <footer>
        <p>Stronę wykonał: 000000000000</p>
    </footer>
    <script>
        function pierwsza(){
            document.getElementById('pierwszy').style.visibility = 'hidden';
            document.getElementById('drugi').style.visibility = 'visible';
        }
        function druga(){
            document.getElementById('drugi').style.visibility = 'hidden';
            document.getElementById('trzeci').style.visibility = 'visible';
        }
        function trzecia(){
            let haslo1 = document.getElementById('haslo1').value;
            let haslo2 = document.getElementById('haslo2').value;

            if(haslo1 == haslo2){
                let imie = document.getElementById('imie').value;
                let nazwisko = document.getElementById('nazwisko').value;
                let wynik = "Witaj " + imie + " " + nazwisko;
                console.log(wynik);
            }
            else{
                alert("Podane hasła różnią się");
            }
        }
    </script>
</body>
</html>
